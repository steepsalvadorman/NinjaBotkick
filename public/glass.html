<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeniorDai — Elite Neon v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; overflow: hidden; color: white; }

        /* ── UNLOCK SCREEN ──────────────────────────────────────────────────────
           Cubre todo el overlay con una capa invisible.
           El streamer hace click UNA sola vez al iniciar OBS → audio desbloqueado
           para siempre durante esa sesión. Después desaparece y no molesta más.
        ────────────────────────────────────────────────────────────────────── */
        #unlock-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.4s ease;
        }

        #unlock-screen .unlock-icon {
            font-size: 64px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #unlock-screen .unlock-text {
            font-size: 1.4rem;
            font-weight: 900;
            color: #53fc18;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(83, 252, 24, 0.6);
        }

        #unlock-screen .unlock-sub {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* ── WAYBAR ─────────────────────────────────────────────────────────── */
        .neon-module {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .rainbow-text {
            background: linear-gradient(90deg, #53fc18, #ffffff, #00e5ff, #ff00ff, #53fc18);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowFlow 3s linear infinite;
        }

        @keyframes rainbowFlow {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ── REPRODUCTOR DE VIDEO ────────────────────────────────────────────── */
        #media-widget {
            position: fixed;
            top: 140px;
            right: 40px;
            width: 480px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        /* Contenedor del video — SIN blur, máxima nitidez */
        #video-container {
            width: 100%;
            height: 247px; /* 16:9 para 440px de ancho interior */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* SIN filter ni transform — video completamente nítido */
        #youtube-player,
        #direct-video {
            width: 100%;
            height: 100%;
            display: block;
        }

        #direct-video { display: none; }

        /* Badge de cola */
        #queue-indicator {
            display: none;
            font-size: 0.7rem;
            font-weight: 700;
            background: #53fc18;
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .player-info-box {
            background: #111;
            border-left: 6px solid #53fc18;
            padding: 12px 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

        #video-requester {
            color: #53fc18 !important;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
        }

        .text-glow { text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50%       { transform: scale(1.1); opacity: 0.7; }
        }

        /* Marquee para títulos largos */
        #video-title.scrolling {
            text-overflow: clip;
            mask-image: linear-gradient(90deg, transparent 0%, black 5%, black 95%, transparent 100%);
        }
        .title-inner { display: inline-block; }
        .title-inner.marquee { animation: title-marquee 25s linear infinite; }
        @keyframes title-marquee {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }
    </style>
</head>
<body class="p-8">

    <!-- ▓▓ UNLOCK SCREEN ▓▓
         Solo visible al iniciar. Click una vez = audio desbloqueado para siempre.
         Sin este click, el browser bloquea el autoplay con audio en OBS.
    ──────────────────────────────────────────────────────────────────────── -->
    <div id="unlock-screen">
        <div class="unlock-icon">🔊</div>
        <div class="unlock-text">Click para activar el overlay</div>
        <div class="unlock-sub">Solo necesitas hacer esto una vez al iniciar OBS</div>
    </div>

    <!-- ▓▓ WAYBAR ▓▓ -->
    <header class="flex justify-between items-center w-full fixed top-0 left-0 p-6 px-10 z-50">
        <div class="flex gap-4 items-center">
            <div class="neon-module border-2 border-red-600 flex items-center gap-4">
                <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_#ff0000]"></div>
                <span class="text-xs font-black tracking-widest text-red-500 uppercase">EN VIVO</span>
            </div>
            <div class="neon-module flex items-center gap-4">
                <i class="ph-fill ph-cloud-sun text-cyan-400 text-3xl"></i>
                <div class="flex flex-col">
                    <span id="weather-temp" class="text-2xl font-black leading-none">--°C</span>
                    <span id="weather-cond" class="text-[9px] font-bold uppercase opacity-50">Cargando...</span>
                </div>
            </div>
        </div>

        <div>
            <h1 class="font-['Outfit'] text-6xl font-black rainbow-text tracking-tighter filter drop-shadow-2xl">
                SeniorDai
            </h1>
        </div>

        <div class="flex gap-4 items-center">
            <div class="neon-module flex items-center gap-4 border-2 border-white/20">
                <i class="ph-bold ph-clock text-white text-3xl"></i>
                <div class="flex flex-col">
                    <span id="clock" class="text-2xl font-black text-glow">00:00:00</span>
                    <span id="date" class="text-[10px] font-bold text-white/40 uppercase">01 MAYO</span>
                </div>
            </div>
            <div class="neon-module flex gap-6 border-2 border-cyan-400/30">
                <div class="flex flex-col items-center">
                    <span class="text-[9px] font-black text-cyan-400 uppercase">CPU</span>
                    <span id="cpu-load" class="text-xl font-black">0%</span>
                </div>
                <div class="flex flex-col items-center border-l border-white/10 pl-4">
                    <span class="text-[9px] font-black text-pink-500 uppercase">RAM</span>
                    <span id="ram-usage" class="text-xl font-black">0%</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ▓▓ REPRODUCTOR DE VIDEO ▓▓ -->
    <div id="media-widget" style="opacity: 0; transform: scale(0.9); display: none;">

        <div id="video-container">
            <div id="youtube-player"></div>
            <video id="direct-video" autoplay></video>
        </div>

        <div class="player-info-box">
            <div class="flex justify-between items-center gap-3">
                <div class="min-w-0 flex-1">
                    <span class="text-[9px] font-black text-white/40 uppercase tracking-widest">Reproduciendo</span>
                    <h2 id="video-title" class="text-base font-black text-white truncate leading-tight mt-1">Cargando...</h2>
                </div>
                <div class="text-right border-l border-white/10 pl-4 shrink-0">
                    <span class="text-[10px] font-black uppercase tracking-widest text-cyan-400 block mb-1">Pedido por</span>
                    <p id="video-requester">---</p>
                </div>
            </div>
            <div class="flex justify-end mt-2">
                <span id="queue-indicator"></span>
            </div>
        </div>

    </div>

    <!-- ▓▓ CHAT ▓▓ -->
    <div id="chat-widget" class="fixed bottom-10 left-10 w-[420px] h-[550px] flex flex-col pointer-events-none">
        <div id="chat-messages" class="flex-1 flex flex-col justify-end gap-5 overflow-hidden"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('es-ES', { hour12: false });
            document.getElementById('date').innerText  = now.toLocaleDateString('es-ES', { day: '2-digit', month: 'long' }).toUpperCase();
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
