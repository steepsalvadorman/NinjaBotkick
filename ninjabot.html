<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kick Widget</title>
<style>
  body { background: transparent; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
  #song { font-size: 35px; margin-bottom: 10px; }
  #queue-count { font-size: 18px; color: #00ffcc; margin-bottom: 5px; }
  #player-container { position: relative; width: 100%; height: 400px; overflow: hidden; }
  #player { width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="song">Esperando canción...</div>
<div id="queue-count"></div>
<div id="player-container">
  <div id="player"></div>
</div>
<audio id="ttsAudio" autoplay></audio>
<script>
const songDiv = document.getElementById("song");
const queueCount = document.getElementById("queue-count");
const ttsAudio = document.getElementById("ttsAudio");

const socket = new WebSocket("ws://localhost:3000");

let queue = [];
let playing = false;
let player;
let videoVisible = true;

// Cargar API de YouTube
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '400',
    width: '100%',
    videoId: '',
    playerVars: { autoplay: 1, controls: 1 },
    events: { 'onStateChange': onPlayerStateChange }
  });
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) playNext();
}

function updateQueueCount() {
  queueCount.textContent = queue.length > 0 ? `📥 ${queue.length} en cola` : '';
}

function playNext() {
  if (queue.length === 0) {
    playing = false;
    songDiv.textContent = "Esperando canción...";
    updateQueueCount();
    if(player && player.stopVideo) player.stopVideo();
    return;
  }
  playing = true;
  const current = queue.shift();
  songDiv.textContent = `🎵 ${current.title}`;
  updateQueueCount();
  if(player && player.loadVideoById) player.loadVideoById(current.videoId);
}

function extractVideoId(url) {
  const match = url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]{11})/);
  return match ? match[1] : null;
}

async function getFirstVideoFromPlaylist(url) {
  try {
    const listId = new URL(url).searchParams.get("list");
    if (!listId) return null;
    const apiKey = 'TU_API_KEY';
    const res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=1&playlistId=${listId}&key=${apiKey}`);
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      return { videoId: data.items[0].snippet.resourceId.videoId, title: data.items[0].snippet.title };
    }
    return null;
  } catch(e) {
    console.error(e);
    return null;
  }
}

socket.onmessage = async (event) => {
  const data = JSON.parse(event.data);

  // Song Request
  if (data.type === "songRequest") {
    let videoData = null;
    const url = data.videoId ? `https://youtu.be/${data.videoId}` : data.song;

    if (url.includes("?list=")) {
      videoData = await getFirstVideoFromPlaylist(url);
      if (!videoData) return;
    } else {
      const videoId = extractVideoId(url);
      if (!videoId) return;

      try {
        const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
        const info = await res.json();
        videoData = { videoId, title: info.title || "Video" };
      } catch {
        videoData = { videoId, title: "Video" };
      }
    }

    queue.push({ videoId: videoData.videoId, title: videoData.title });
    if (!playing) playNext();
    updateQueueCount();
  }

  // Next video (solo si el dueño envía ownerCommand)
  if (data.type === "nextVideo" && data.ownerCommand) {
    playNext();
  }

  // Speak !s
  if (data.type === "speak") {
    const audio = new Audio(`data:audio/mp3;base64,${data.audioBase64}`);
    audio.play();
  }

  // Toggle video !von / !voff
  if (data.type === "toggleVideo" && player && player.getIframe) {
    videoVisible = data.showVideo;
    player.getIframe().style.display = videoVisible ? 'block' : 'none';
  }
};
</script>


</body>
</html>
